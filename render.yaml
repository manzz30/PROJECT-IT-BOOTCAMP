services:
  - type: web
    name: faceattend-ai
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0

databases:
  - name: faceattend-db
    plan: free
    ipAllowList: []