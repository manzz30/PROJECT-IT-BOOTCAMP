<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - FaceAttend AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .admin-container { max-width: 800px; margin: 40px auto; padding: 20px; }
        
        .card-premium {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: slideUp 0.5s ease;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        h2 { font-weight: 800; margin-bottom: 1.5rem; color: #fff; }
        label { color: #94a3b8; font-weight: 600; margin-bottom: 0.5rem; display: block; }
        
        .form-control, .form-select {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid #334155;
            color: #fff;
            padding: 12px;
            border-radius: 12px;
        }
        .form-control:focus, .form-select:focus { background: #0f172a; border-color: #6366f1; color: #fff; box-shadow: 0 0 0 4px rgba(99,102,241,0.2); }
        
        .btn-save {
            background: linear-gradient(135deg, #6366f1, #06b6d4);
            border: none; color: white; padding: 12px 30px; border-radius: 12px; font-weight: bold; width: 100%;
            transition: 0.3s;
        }
        .btn-save:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(99,102,241,0.3); }
        
        .back-link { color: #64748b; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; margin-bottom: 20px; }
        .back-link:hover { color: white; }
    </style>
</head>
<body>
    <div class="admin-container">
        <a href="/dashboard" class="back-link"><i class="fas fa-arrow-left"></i> Kembali ke Dashboard</a>
        
        <h2><i class="fas fa-shield-alt"></i> Admin Control Center</h2>
        
        <!-- Settings Card -->
        <div class="card-premium">
            <h4 class="mb-4">⚙️ Pengaturan Absensi</h4>
            <form id="settingsForm">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Jam Masuk</label>
                        <input type="time" id="jamMasuk" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Toleransi (Menit)</label>
                        <input type="number" id="toleransi" class="form-control" placeholder="15" required>
                    </div>
                </div>
                <button type="submit" class="btn-save mt-3"><i class="fas fa-save"></i> Simpan Pengaturan</button>
            </form>
        </div>

        <!-- Security Card -->
        <div class="card-premium">
            <h4 class="mb-4">🔒 Keamanan Admin</h4>
            <form id="passForm">
                <div class="mb-3">
                    <label>Password Saat Ini</label>
                    <input type="password" id="oldPass" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Password Baru</label>
                    <input type="password" id="newPass" class="form-control" required>
                </div>
                <button type="submit" class="btn-save mt-3" style="background: linear-gradient(135deg, #ef4444, #f97316);">
                    <i class="fas fa-key"></i> Update Password
                </button>
            </form>
        </div>
    </div>

    <script>
        const API = '/api/settings';
        
        // Load Settings on Start
        window.addEventListener('load', async () => {
            const res = await fetch(`${API}/get-settings`);
            const data = await res.json();
            document.getElementById('jamMasuk').value = data.jam_masuk;
            document.getElementById('toleransi').value = data.toleransi;
        });

        // Save Settings
        document.getElementById('settingsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                jam_masuk: document.getElementById('jamMasuk').value,
                toleransi: document.getElementById('toleransi').value,
                password_check: prompt("Masukkan Password Admin saat ini:"),
                new_pass: null
            };
            if(!data.password_check) return;

            const res = await fetch(`${API}/update-settings`, {
                method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)
            });
            
            if(res.ok) alert("✅ Pengaturan berhasil disimpan!");
            else alert("❌ Password admin salah!");
        });

        // Update Password
        document.getElementById('passForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                jam_masuk: document.getElementById('jamMasuk').value,
                toleransi: document.getElementById('toleransi').value,
                password_check: document.getElementById('oldPass').value,
                new_pass: document.getElementById('newPass').value
            };

            const res = await fetch(`${API}/update-settings`, {
                method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data)
            });
            
            if(res.ok) { alert("✅ Password berhasil diubah!"); document.getElementById('passForm').reset(); }
            else alert("❌ Password lama salah!");
        });
    </script>
</body>
</html>
