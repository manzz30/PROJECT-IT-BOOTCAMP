<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - FaceAttend</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navbar simple -->
    <nav class="navbar-custom mb-4">
        <a class="navbar-brand-custom" href="index.html"><i class="fas fa-arrow-left"></i> Back</a>
        <span style="color:white; font-weight:bold;">Admin Panel</span>
    </nav>

    <div class="container" style="max-width: 600px;">
        
        <!-- Form Login Dulu -->
        <div id="login-box" class="card p-4">
            <h4 class="text-center mb-3">🔐 Admin Login</h4>
            <input type="password" id="passInput" class="form-control mb-3" placeholder="Password Admin">
            <button onclick="cekLogin()" class="btn btn-primary w-100">Masuk</button>
            <p id="err-msg" class="text-danger text-center mt-2" style="display:none;">Password salah!</p>
        </div>

        <!-- Form Setting (Disembunyikan awal) -->
        <div id="setting-box" class="card p-4" style="display:none;">
            <h4 class="mb-3">⚙️ Pengaturan Waktu</h4>
            
            <div class="mb-3">
                <label class="form-label">Jam Masuk</label>
                <input type="time" id="jamInput" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Toleransi (Menit)</label>
                <input type="number" id="tolInput" class="form-control" placeholder="Misal: 15">
                <div class="form-text">Jika 0, berarti harus pas jam masuk.</div>
            </div>

            <hr>

            <div class="mb-3">
                <label class="form-label">Ganti Password Admin</label>
                <input type="text" id="newPassInput" class="form-control" placeholder="Kosongkan jika tidak ingin diganti">
            </div>

            <button onclick="simpanData()" class="btn btn-success w-100">Simpan Perubahan</button>
            <button onclick="logout()" class="btn btn-outline-danger w-100 mt-2">Logout</button>
        </div>

    </div>

    <script>
        // Cek sesi lokal
        if(localStorage.getItem('isAdmin') === 'true'){
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('setting-box').style.display = 'block';
            loadData();
        }

        async function cekLogin(){
            const pass = document.getElementById('passInput').value;
            // Hardcoded password default, nanti diganti user
            if(pass === "admin"){ 
                localStorage.setItem('isAdmin', 'true');
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('setting-box').style.display = 'block';
                loadData();
            } else {
                document.getElementById('err-msg').style.display = 'block';
            }
        }

        async function loadData(){
            try {
                const res = await fetch('http://localhost:8000/api/settings/get-settings');
                const data = await res.json();
                document.getElementById('jamInput').value = data.jam_masuk;
                document.getElementById('tolInput').value = data.toleransi;
            } catch(e) {
                console.log("Gagal load settings");
            }
        }

        async function simpanData(){
            const jam = document.getElementById('jamInput').value;
            const tol = document.getElementById('tolInput').value;
            const newPass = document.getElementById('newPassInput').value;
            
            // Gunakan password yang sedang aktif (default 'admin' kalau belum ganti)
            // Di real app ini harusnya token, tapi untuk contest pakai localStorage cukup aman
            const passCheck = localStorage.getItem('currentPass') || 'admin';

            const body = {
                jam_masuk: jam,
                toleransi: parseInt(tol),
                password_check: passCheck,
                new_pass: newPass
            };

            try {
                const res = await fetch('http://localhost:8000/api/settings/update-settings', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(body)
                });
                const result = await res.json();

                if(res.ok){
                    alert("✅ Setting berhasil disimpan!");
                    if(newPass) {
                        localStorage.setItem('currentPass', newPass);
                        document.getElementById('newPassInput').value = '';
                    }
                } else {
                    alert("❌ " + result.detail);
                }
            } catch(e){
                alert("Gagal koneksi server");
            }
        }

        function logout(){
            localStorage.removeItem('isAdmin');
            location.reload();
        }
    </script>
</body>
</html>
