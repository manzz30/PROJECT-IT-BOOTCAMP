<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - FaceAttend AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark text-light">
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-primary shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="fas fa-graduation-cap"></i> FaceAttend AI
            </a>
            <a href="index.html" class="btn btn-outline-light btn-sm">
                <i class="fas fa-home"></i> Kembali
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-5">
        <div class="row">
            <div class="col-12">
                <div class="card bg-dark border-primary">
                    <div class="card-body p-4">
                        <h2 class="mb-4">
                            <i class="fas fa-chart-bar text-primary"></i> Dashboard Absensi
                        </h2>
                        
                        <!-- Statistics Cards -->
                        <div class="row mb-4">
                            <div class="col-md-3">
                                <div class="card bg-success text-white">
                                    <div class="card-body text-center">
                                        <i class="fas fa-check-circle fa-2x mb-2"></i>
                                        <h3 id="totalHadir">0</h3>
                                        <p class="mb-0">Hadir Hari Ini</p>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="card bg-info text-white">
                                    <div class="card-body text-center">
                                        <i class="fas fa-clock fa-2x mb-2"></i>
                                        <h3 id="totalTepatWaktu">0</h3>
                                        <p class="mb-0">Tepat Waktu</p>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="card bg-warning text-dark">
                                    <div class="card-body text-center">
                                        <i class="fas fa-exclamation-triangle fa-2x mb-2"></i>
                                        <h3 id="totalTerlambat">0</h3>
                                        <p class="mb-0">Terlambat</p>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-3">
                                <div class="card bg-primary text-white">
                                    <div class="card-body text-center">
                                        <i class="fas fa-users fa-2x mb-2"></i>
                                        <h3 id="totalUser">0</h3>
                                        <p class="mb-0">Total Terdaftar</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Date Filter -->
                        <div class="row mb-3">
                            <div class="col-md-6">
                                <div class="input-group">
                                    <span class="input-group-text bg-dark text-light border-secondary">
                                        <i class="fas fa-calendar"></i> Pilih Tanggal:
                                    </span>
                                    <input type="date" id="dateFilter" class="form-control bg-dark text-light border-secondary">
                                    <button class="btn btn-primary" onclick="loadAttendanceData()">
                                        <i class="fas fa-sync-alt"></i> Refresh
                                    </button>
                                    <button class="btn btn-success" onclick="exportToExcel()">
                                        <i class="fas fa-file-excel"></i> Export Excel
                                    </button>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Attendance Table -->
                        <div class="table-responsive">
                            <table class="table table-dark table-striped table-hover">
                                <thead class="table-primary">
                                    <tr>
                                        <th>No</th>
                                        <th>Nama</th>
                                        <th>NIM/NIP</th>
                                        <th>Tanggal</th>
                                        <th>Waktu Masuk</th>
                                        <th>Status</th>
                                        <th>Confidence</th>
                                    </tr>
                                </thead>
                                <tbody id="attendanceTable">
                                    <tr>
                                        <td colspan="7" class="text-center">
                                            <span class="spinner-border spinner-border-sm"></span> 
                                            Memuat data...
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        
                        <div id="noDataMessage" class="alert alert-info text-center" style="display: none;">
                            <i class="fas fa-info-circle"></i> Belum ada data absensi untuk tanggal ini
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
