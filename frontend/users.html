<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola User - FaceAttend AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-brain"></i> FaceAttend AI
            </a>
            <a href="index.html" class="btn btn-outline-light btn-sm">
                <i class="fas fa-home"></i> Kembali
            </a>
        </div>
    </nav>

    <div class="container mt-5 pt-5">
        <div class="card">
            <div class="card-body p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h2><i class="fas fa-users-cog text-primary"></i> Kelola Pengguna Terdaftar</h2>
                    <button class="btn btn-primary" onclick="loadUsers()">
                        <i class="fas fa-sync-alt"></i> Refresh Data
                    </button>
                </div>
                
                <div class="alert alert-info">
                    <i class="fas fa-info-circle"></i> 
                    <strong>Info:</strong> Menghapus pengguna akan menghapus semua data absensi mereka secara permanen.
                </div>
                
                <div class="table-responsive">
                    <table class="table table-dark table-hover">
                        <thead>
                            <tr>
                                <th>No</th>
                                <th>Nama Lengkap</th>
                                <th>NIM/NIP</th>
                                <th>Email</th>
                                <th>Jurusan</th>
                                <th>Terdaftar Sejak</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="usersTable">
                            <tr>
                                <td colspan="7" class="text-center">
                                    <span class="spinner-border spinner-border-sm"></span> Memuat data...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <div id="noUsersMsg" class="alert alert-warning text-center" style="display:none;">
                    <i class="fas fa-exclamation-triangle"></i> Belum ada pengguna terdaftar
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/main.js"></script>
    <script>
        async function loadUsers() {
            const tbody = document.getElementById('usersTable');
            tbody.innerHTML = '<tr><td colspan="7" class="text-center"><span class="spinner-border spinner-border-sm"></span> Memuat...</td></tr>';
            
            try {
                const res = await fetch(`${API_URL}/users`);
                const users = await res.json();
                
                if (users.length === 0) {
                    tbody.innerHTML = '';
                    document.getElementById('noUsersMsg').style.display = 'block';
                    return;
                }
                
                document.getElementById('noUsersMsg').style.display = 'none';
                tbody.innerHTML = '';
                
                users.forEach((u, i) => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${i + 1}</td>
                        <td><strong>${u.nama}</strong></td>
                        <td><span class="badge bg-info">${u.nim}</span></td>
                        <td>${u.email || '-'}</td>
                        <td>${u.jurusan || '-'}</td>
                        <td>${new Date(u.created_at).toLocaleDateString('id-ID')}</td>
                        <td>
                            <button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id}, '${u.nama}')">
                                <i class="fas fa-trash"></i> Hapus
                            </button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center text-danger">Gagal memuat data</td></tr>';
            }
        }
        
        async function deleteUser(id, nama) {
            if (!confirm(`⚠️ Yakin ingin menghapus "${nama}"?\n\nSemua data absensi pengguna ini akan dihapus permanen!`)) return;
            
            try {
                const res = await fetch(`${API_URL}/users/${id}`, { method: 'DELETE' });
                const result = await res.json();
                
                if (res.ok) {
                    showNotification(`✅ ${nama} berhasil dihapus!`, 'success');
                    loadUsers();
                } else {
                    showNotification(`❌ Gagal: ${result.detail}`, 'danger');
                }
            } catch (e) {
                showNotification('❌ Gagal terhubung ke server', 'danger');
            }
        }
        
        // Load on page load
        window.addEventListener('load', loadUsers);
    </script>
</body>
</html>
