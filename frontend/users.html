<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola User - FaceAttend</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .back-btn { color: #94a3b8; text-decoration: none; font-weight: bold; display: inline-flex; align-items: center; gap: 5px; margin-bottom: 2rem; transition: 0.3s; }
        .back-btn:hover { color: white; transform: translateX(-5px); }
        
        .glass-panel { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 2rem; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3); animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th { text-align: left; padding: 1rem; color: #94a3b8; font-size: 0.9rem; border-bottom: 1px solid #334155; }
        td { padding: 1rem; border-bottom: 1px solid #1e293b; vertical-align: middle; }
        tr { transition: 0.3s; }
        tr:hover { background: rgba(99,102,241,0.05); }
        
        .btn-delete { background: rgba(239,68,68,0.1); color: #ef4444; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .btn-delete:hover { background: #ef4444; color: white; }
        
        .empty-state { text-align: center; padding: 3rem; color: #64748b; }
        
        /* Toast */
        .toast { position: fixed; bottom: 20px; right: 20px; background: #10b981; color: white; padding: 12px 24px; border-radius: 12px; animation: slideIn 0.4s; z-index: 1000; display: none; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>
    <div class="container py-5">
        <a href="/dashboard" class="back-btn"><i class="fas fa-arrow-left"></i> Kembali ke Dashboard</a>
        
        <div class="glass-panel">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3><i class="fas fa-users text-primary"></i> Kelola Pengguna</h3>
                <button onclick="loadUsers()" class="btn btn-sm btn-outline-light"><i class="fas fa-sync"></i> Refresh</button>
            </div>
            
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Nama Lengkap</th>
                            <th>NIM/NIP</th>
                            <th>Jurusan</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="userTable">
                        <tr><td colspan="4" class="empty-state">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">Berhasil dihapus!</div>

    <script>
        async function loadUsers() {
            const tbody = document.getElementById('userTable');
            try {
                const res = await fetch('/api/users');
                const data = await res.json();
                tbody.innerHTML = '';
                
                if(data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="empty-state">Belum ada pengguna terdaftar.</td></tr>';
                    return;
                }

                data.forEach(u => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${u.nama}</td>
                            <td><span style="background:#334155; padding:4px 8px; border-radius:6px; font-size:0.85rem;">${u.nim}</span></td>
                            <td>${u.jurusan || '-'}</td>
                            <td>
                                <button class="btn-delete" onclick="deleteUser(${u.id})">
                                    <i class="fas fa-trash"></i> Hapus
                                </button>
                            </td>
                        </tr>
                    `;
                });
            } catch(e) {
                tbody.innerHTML = '<tr><td colspan="4" class="empty-state">Gagal memuat data.</td></tr>';
            }
        }

        async function deleteUser(id) {
            if(!confirm('Yakin hapus user ini?')) return;
            try {
                await fetch(`/api/users/${id}`, { method: 'DELETE' });
                showToast();
                loadUsers();
            } catch(e) { alert('Gagal'); }
        }

        function showToast() {
            const t = document.getElementById('toast');
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }

        loadUsers();
    </script>
</body>
</html>
