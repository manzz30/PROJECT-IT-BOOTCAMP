<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - FaceAttend AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --secondary: #06b6d4; --dark: #0f172a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #0f172a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }
        
        @keyframes gradientBG {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        
        .particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; }
        .particle {
            position: absolute;
            width: 4px; height: 4px;
            background: rgba(99, 102, 241, 0.6);
            border-radius: 50%;
            animation: float 20s infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }
        
        .login-box {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(99, 102, 241, 0.4);
            border-radius: 24px;
            padding: 3rem;
            max-width: 480px;
            width: 90%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), 0 0 100px rgba(99,102,241,0.2);
            animation: slideUp 0.8s ease;
            position: relative;
            z-index: 10;
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .logo { text-align: center; margin-bottom: 2rem; }
        .logo i {
            font-size: 4rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .logo h1 {
            color: #ffffff;
            font-size: 2rem;
            font-weight: 800;
            margin-top: 1rem;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        
        .features { display: flex; gap: 10px; justify-content: center; margin-bottom: 2rem; flex-wrap: wrap; }
        .badge {
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(99, 102, 241, 0.4);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 0.8rem;
            color: #a5b4fc;
            font-weight: 600;
            animation: fadeIn 0.6s ease backwards;
        }
        .badge:nth-child(1) { animation-delay: 0.1s; }
        .badge:nth-child(2) { animation-delay: 0.2s; }
        .badge:nth-child(3) { animation-delay: 0.3s; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .form-group { margin-bottom: 1.5rem; position: relative; }
        .form-group i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #cbd5e1;
            font-size: 1.1rem;
            transition: all 0.3s;
            z-index: 2;
        }
        .form-control {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background: rgba(30, 41, 59, 0.8);
            border: 2px solid rgba(99, 102, 241, 0.3);
            border-radius: 12px;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s;
            outline: none;
        }
        .form-control::placeholder { color: #cbd5e1; font-weight: 400; opacity: 0.8; }
        .form-control:focus {
            background: rgba(30, 41, 59, 0.95);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
            color: #ffffff;
        }
        .form-control:focus + i { color: var(--primary); }
        
        .btn-primary {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 12px;
            color: #ffffff;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(99, 102, 241, 0.4);
        }
        
        .toggle {
            text-align: center;
            margin-top: 1.5rem;
            color: #cbd5e1;
            font-size: 0.95rem;
        }
        .toggle a {
            color: #818cf8;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
        }
        .toggle a:hover { color: #60a5fa; text-decoration: underline; }
        
        .error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #fca5a5;
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            display: none;
            animation: shake 0.5s;
            font-weight: 500;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .hidden { display: none; }
        .loading {
            display: inline-block;
            width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* MOBILE RESPONSIVE */
        @media (max-width: 640px) {
            .login-box { padding: 2rem 1.5rem; width: 95%; }
            .logo h1 { font-size: 1.5rem; }
            .logo i { font-size: 3rem; }
            .features { flex-direction: column; }
            .badge { width: 100%; text-align: center; }
            .form-control { font-size: 16px; } /* Prevent zoom on iOS */
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    
    <div class="login-box">
        <div class="logo">
            <i class="fas fa-brain"></i>
            <h1>FaceAttend AI</h1>
        </div>
        
        <div class="features">
            <div class="badge"><i class="fas fa-shield-alt"></i> Anti-Spoofing</div>
            <div class="badge"><i class="fas fa-bolt"></i> Real-Time</div>
            <div class="badge"><i class="fas fa-robot"></i> AI Powered</div>
        </div>
        
        <div id="error" class="error"></div>
        
        <!-- Login Form -->
        <form id="loginForm" onsubmit="event.preventDefault(); doLogin();">
            <div class="form-group">
                <input type="text" id="loginNim" class="form-control" placeholder="NIM / NIP" required autocomplete="off">
                <i class="fas fa-id-card"></i>
            </div>
            <div class="form-group">
                <input type="password" id="loginPass" class="form-control" placeholder="Password" required>
                <i class="fas fa-lock"></i>
            </div>
            <button type="submit" class="btn-primary">
                <i class="fas fa-sign-in-alt"></i> Masuk
            </button>
            <div class="toggle">
                Belum punya akun? <a onclick="showRegister()">Daftar</a>
            </div>
        </form>
        
        <!-- Register Form -->
        <form id="registerForm" class="hidden" onsubmit="event.preventDefault(); doRegister();">
            <div class="form-group">
                <input type="text" id="regNama" class="form-control" placeholder="Nama Lengkap" required autocomplete="off">
                <i class="fas fa-user"></i>
            </div>
            <div class="form-group">
                <input type="text" id="regNim" class="form-control" placeholder="NIM / NIP" required autocomplete="off">
                <i class="fas fa-id-card"></i>
            </div>
            <div class="form-group">
                <input type="email" id="regEmail" class="form-control" placeholder="Email (Opsional)">
                <i class="fas fa-envelope"></i>
            </div>
            <div class="form-group">
                <input type="text" id="regJurusan" class="form-control" placeholder="Jurusan (Opsional)">
                <i class="fas fa-graduation-cap"></i>
            </div>
            <div class="form-group">
                <input type="password" id="regPass" class="form-control" placeholder="Password (Min. 6 karakter)" minlength="6" required>
                <i class="fas fa-lock"></i>
            </div>
            <button type="submit" class="btn-primary">
                <i class="fas fa-user-plus"></i> Daftar
            </button>
            <div class="toggle">
                Sudah punya akun? <a onclick="showLogin()">Login</a>
            </div>
        </form>
    </div>

    <script>
        // Create particles
        for (let i = 0; i < 50; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 20 + 's';
            p.style.animationDuration = (Math.random() * 10 + 15) + 's';
            document.getElementById('particles').appendChild(p);
        }
        
        const API = location.hostname === 'localhost' ? 'http://localhost:8000/api' : '/api';
        
        function showRegister() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
            document.getElementById('error').style.display = 'none';
        }
        
        function showLogin() {
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('error').style.display = 'none';
        }
        
        async function doLogin() {
            const nim = document.getElementById('loginNim').value.trim();
            const pass = document.getElementById('loginPass').value;
            const btn = document.querySelector('#loginForm .btn-primary');
            const err = document.getElementById('error');
            
            if (!nim || !pass) {
                err.textContent = '⚠️ Isi NIM dan password!';
                err.style.display = 'block';
                return;
            }
            
            const orig = btn.innerHTML;
            btn.innerHTML = '<span class="loading"></span> Memproses...';
            btn.disabled = true;
            
            try {
                const res = await fetch(`${API}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nim_nip: nim, password: pass })
                });
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('user', JSON.stringify(data.user));
                    err.style.background = 'rgba(16,185,129,0.2)';
                    err.style.borderColor = 'rgba(16,185,129,0.4)';
                    err.style.color = '#6ee7b7';
                    err.textContent = '✅ Login berhasil! Mengalihkan...';
                    err.style.display = 'block';
                    setTimeout(() => window.location.href = '/dashboard', 1000);
                } else {
                    err.textContent = '⚠️ ' + (data.detail || 'Login gagal');
                    err.style.display = 'block';
                }
            } catch (e) {
                err.textContent = '⚠️ Gagal koneksi server';
                err.style.display = 'block';
            } finally {
                btn.innerHTML = orig;
                btn.disabled = false;
            }
        }
        
        async function doRegister() {
            const data = {
                nama_lengkap: document.getElementById('regNama').value.trim(),
                nim_nip: document.getElementById('regNim').value.trim(),
                email: document.getElementById('regEmail').value.trim(),
                jurusan: document.getElementById('regJurusan').value.trim(),
                password: document.getElementById('regPass').value,
                face_embedding: '[]'
            };
            const btn = document.querySelector('#registerForm .btn-primary');
            const err = document.getElementById('error');
            
            if (!data.nama_lengkap || !data.nim_nip || data.password.length < 6) {
                err.textContent = '⚠️ Isi semua field & password min 6 karakter!';
                err.style.display = 'block';
                return;
            }
            
            const orig = btn.innerHTML;
            btn.innerHTML = '<span class="loading"></span> Mendaftar...';
            btn.disabled = true;
            
            try {
                const res = await fetch(`${API}/register-manual`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                
                if (res.ok) {
                    err.style.background = 'rgba(16,185,129,0.2)';
                    err.style.borderColor = 'rgba(16,185,129,0.4)';
                    err.style.color = '#6ee7b7';
                    err.textContent = '✅ Registrasi berhasil! Silakan daftar wajah...';
                    err.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = '/register-face';
                    }, 1500);
                } else {
                    err.textContent = '⚠️ ' + (result.detail || 'Registrasi gagal');
                    err.style.display = 'block';
                }
            } catch (e) {
                err.textContent = '⚠️ Gagal koneksi server';
                err.style.display = 'block';
            } finally {
                btn.innerHTML = orig;
                btn.disabled = false;
            }
        }
        
        // Auto redirect if already logged in
        if (localStorage.getItem('user')) {
            window.location.href = '/dashboard';
        }
    </script>
</body>
</html>
