<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrasi - FaceAttend AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark text-light">
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-primary shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <i class="fas fa-graduation-cap"></i> FaceAttend AI
            </a>
            <a href="index.html" class="btn btn-outline-light btn-sm">
                <i class="fas fa-home"></i> Kembali
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-12">
                <div class="card bg-dark border-primary">
                    <div class="card-body p-4">
                        <h2 class="text-center mb-4">
                            <i class="fas fa-user-plus text-primary"></i> Registrasi Wajah Baru
                        </h2>
                        
                        <div class="row">
                            <!-- Form Section -->
                            <div class="col-md-5">
                                <form id="registrationForm">
                                    <div class="mb-3">
                                        <label for="nama" class="form-label">
                                            <i class="fas fa-user"></i> Nama Lengkap *
                                        </label>
                                        <input type="text" class="form-control" id="nama" required>
                                    </div>
                                    
                                    <div class="mb-3">
                                        <label for="nim" class="form-label">
                                            <i class="fas fa-id-card"></i> NIM/NIP *
                                        </label>
                                        <input type="text" class="form-control" id="nim" required>
                                    </div>
                                    
                                    <div class="mb-3">
                                        <label for="email" class="form-label">
                                            <i class="fas fa-envelope"></i> Email
                                        </label>
                                        <input type="email" class="form-control" id="email">
                                    </div>
                                    
                                    <div class="mb-3">
                                        <label for="jurusan" class="form-label">
                                            <i class="fas fa-graduation-cap"></i> Jurusan/Departemen
                                        </label>
                                        <input type="text" class="form-control" id="jurusan">
                                    </div>
                                    
                                    <button type="submit" class="btn btn-success w-100 btn-lg">
                                        <i class="fas fa-save"></i> Simpan & Daftar
                                    </button>
                                </form>
                            </div>
                            
                            <!-- Camera Section -->
                            <div class="col-md-7">
                                <div class="video-container mb-3">
                                    <video id="video" autoplay muted playsinline></video>
                                    <canvas id="overlay"></canvas>
                                </div>
                                
                                <div id="detectionStatus" class="text-center">
                                    <span class="spinner-border spinner-border-sm text-warning"></span>
                                    <span class="ms-2">Memuat model AI...</span>
                                </div>
                                
                                <div class="alert alert-info mt-3">
                                    <i class="fas fa-info-circle"></i> 
                                    <strong>Petunjuk:</strong>
                                    <ul class="mb-0 mt-2">
                                        <li>Pastikan pencahayaan cukup</li>
                                        <li>Hadapkan wajah ke kamera</li>
                                        <li>Lepas kacamata/topi jika ada</li>
                                        <li>Tunggu hingga wajah terdeteksi</li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/register.js"></script>
</body>
</html>
